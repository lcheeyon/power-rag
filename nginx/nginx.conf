worker_processes 1;
error_log /opt/homebrew/var/log/nginx/power-rag-error.log warn;
pid       /opt/homebrew/var/run/power-rag-nginx.pid;

events {
    worker_connections 1024;
}

http {
    include      /opt/homebrew/etc/nginx/mime.types;
    default_type application/octet-stream;
    sendfile     on;
    keepalive_timeout 65;
    client_max_body_size 200m;

    # ── SSL shared settings ────────────────────────────────────────────────
    ssl_certificate     /Users/cheeyong/gitlab/power_rag/ssl/localhost.crt;
    ssl_certificate_key /Users/cheeyong/gitlab/power_rag/ssl/localhost.key;
    ssl_protocols       TLSv1.2 TLSv1.3;
    ssl_ciphers         HIGH:!aNULL:!MD5;
    ssl_session_cache   shared:SSL:10m;
    ssl_session_timeout 10m;

    # ── HTTPS: Frontend + Backend API (unified, same origin) ──────────────
    # Access the full app at: https://localhost:3443
    server {
        listen 3443 ssl;
        server_name localhost;

        # Backend API — proxy /api/* and /actuator/* to Spring Boot
        location /api/ {
            proxy_pass         http://127.0.0.1:8080;
            proxy_http_version 1.1;
            proxy_set_header   Host              $host;
            proxy_set_header   X-Real-IP         $remote_addr;
            proxy_set_header   X-Forwarded-For   $proxy_add_x_forwarded_for;
            proxy_set_header   X-Forwarded-Proto https;
            proxy_read_timeout 300s;
            proxy_connect_timeout 10s;
            proxy_send_timeout 300s;
        }

        location /actuator/ {
            proxy_pass         http://127.0.0.1:8080;
            proxy_http_version 1.1;
            proxy_set_header   Host              $host;
            proxy_set_header   X-Forwarded-Proto https;
        }

        # Frontend — Vite dev server with WebSocket HMR support
        location / {
            proxy_pass         http://[::1]:3000;
            proxy_http_version 1.1;
            proxy_set_header   Upgrade           $http_upgrade;
            proxy_set_header   Connection        "upgrade";
            proxy_set_header   Host              $host;
            proxy_set_header   X-Forwarded-Proto https;
            proxy_read_timeout 86400s;
        }
    }

    # ── HTTPS: Backend API direct access ──────────────────────────────────
    # Direct backend HTTPS at: https://localhost:8443
    server {
        listen 8443 ssl;
        server_name localhost;

        location / {
            proxy_pass         http://127.0.0.1:8080;
            proxy_http_version 1.1;
            proxy_set_header   Host              $host;
            proxy_set_header   X-Real-IP         $remote_addr;
            proxy_set_header   X-Forwarded-For   $proxy_add_x_forwarded_for;
            proxy_set_header   X-Forwarded-Proto https;
            proxy_read_timeout 120s;
        }
    }
}
